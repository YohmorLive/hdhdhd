services:
  # Backend API
  - type: web
    name: lebalert-api
    runtime: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # Web Frontend
  - type: web
    name: lebalert-web
    runtime: node
    region: frankfurt
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://lebalert-api.onrender.com
      - key: PORT
        value: 10000
